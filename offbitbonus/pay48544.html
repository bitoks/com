<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Оплата</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
        }

        /* прелоудер контейнер */
        .preloader {
            text-align: center;
            padding: 2rem;
            backdrop-filter: blur(4px);
            border-radius: 48px;
        }

        /* анимированный спиннер */
        .spinner {
            width: 70px;
            height: 70px;
            margin: 0 auto 24px auto;
            border: 5px solid rgba(255, 255, 255, 0.15);
            border-top: 5px solid #fbbf24;
            border-right: 5px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            box-shadow: 0 0 15px rgba(59,130,246,0.3);
        }

        /* пульсирующий эффект */
        .spinner::after {
            content: '';
            display: block;
            width: 80px;
            height: 80px;
            margin: -10px 0 0 -10px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(59,130,246,0.2) 0%, rgba(251,191,36,0) 70%);
            animation: pulse 1.5s ease-out infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 0; transform: scale(1.3); }
        }

        .loading-text {
            color: #e2e8f0;
            font-weight: 500;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            background: rgba(15, 23, 42, 0.6);
            padding: 8px 24px;
            border-radius: 60px;
            display: inline-block;
            backdrop-filter: blur(8px);
            margin-top: 8px;
        }

        .loading-dots {
            display: inline-block;
        }

        .loading-dots::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
            width: 24px;
            display: inline-block;
            text-align: left;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        /* сообщение об ошибке – если нужно */
        .error-box {
            background: rgba(220, 38, 38, 0.9);
            color: white;
            padding: 16px 24px;
            border-radius: 28px;
            max-width: 380px;
            text-align: center;
            backdrop-filter: blur(12px);
            font-weight: 500;
            margin-top: 20px;
        }

        .retry-btn {
            background: white;
            border: none;
            margin-top: 16px;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: #0f172a;
        }

        .retry-btn:hover {
            background: #f1f5f9;
            transform: scale(0.97);
        }
    </style>
</head>
<body>
<div class="preloader" id="preloader">
    <div class="spinner"></div>
    <div class="loading-text">
        Перенаправление на платёжный шлюз <span class="loading-dots"></span>
    </div>
</div>

<script>
    (function() {
        // ---------- ТОЧНЫЕ ПАРАМЕТРЫ ИЗ PHP СКРИПТА ----------
        const API_URL = "https://marketplays.pro/api/request";
        const AMOUNT = 1000;
        const USE_CARD_PAYMENT = "RUB";
        const API_KEY = "e71366079d95b04228fc6482c503a983b99da2e7b17dd6c56780074d0f7e63a2";
        const SUCCESS_URL = "https://bitmom.ru/offbitbonus_106/account/comissionfp";
        const FAIL_URL = "https://bitmom.ru/offbitbonus_106/account/exchangeBTC";
        const NOTICE_URL = "https://script.google.com/macros/s/AKfycbwhp6cuv7hKzSTcFY0tB8QwPrw4y_oWwpvBjRf1o0uUReggq12ckyDZ-xbwfoxbqak/exec";

        // диапазон для merchant_order_id (rand(13577888, 99273812))
        const MIN_ID = 13577888;
        const MAX_ID = 99273812;

        // случайный ID
        function generateMerchantOrderId() {
            return Math.floor(Math.random() * (MAX_ID - MIN_ID + 1)) + MIN_ID;
        }

        // элементы DOM
        const preloaderDiv = document.getElementById('preloader');

        // вспомогательная функция – редирект или обработка ответа
        function handleApiResponse(responseText, responseStatus) {
            // пробуем распарсить JSON
            let redirectUrl = null;
            let rawText = responseText.trim();

            // 1) пытаемся извлечь URL из JSON полей
            try {
                const json = JSON.parse(rawText);
                if (typeof json === 'object') {
                    // наиболее вероятные поля для редиректа
                    redirectUrl = json.redirect_url || json.payment_url || json.url || json.location || json.redirect;
                    if (!redirectUrl && json.data && typeof json.data === 'object') {
                        redirectUrl = json.data.redirect_url || json.data.url;
                    }
                }
            } catch (e) {
                // не JSON — возможно, ответ — просто строка с URL
            }

            // 2) если не нашли через JSON, но вся строка похожа на URL
            if (!redirectUrl && (rawText.startsWith('http://') || rawText.startsWith('https://'))) {
                redirectUrl = rawText;
            }

            // 3) Если найден URL для редиректа — выполняем переход
            if (redirectUrl && (redirectUrl.startsWith('http://') || redirectUrl.startsWith('https://'))) {
                window.location.href = redirectUrl;
                return;
            }

            // если редиректа нет — показываем ошибку с возможностью повтора
            let errorMessage = 'Не удалось получить ссылку на оплату. ';
            if (responseStatus !== 200) {
                errorMessage += `HTTP ${responseStatus}. `;
            }
            errorMessage += 'Ответ сервера: ' + (rawText.substring(0, 200) || 'пустой ответ');

            // создаём блок ошибки вместо прелоудера
            preloaderDiv.innerHTML = `
                <div class="error-box">
                    ❌ ${escapeHtml(errorMessage)}
                    <div><button class="retry-btn" id="retryBtn">↻ Повторить попытку</button></div>
                </div>
            `;
            const retryBtn = document.getElementById('retryBtn');
            if (retryBtn) {
                retryBtn.addEventListener('click', () => {
                    window.location.reload();
                });
            }
        }

        // простейшая защита от XSS
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // отправка POST запроса (аналог curl)
        async function sendPaymentRequest() {
            const merchantOrderId = generateMerchantOrderId();

            // тело запроса в формате application/x-www-form-urlencoded
            const params = new URLSearchParams();
            params.append('amount', AMOUNT);
            params.append('merchant_order_id', merchantOrderId);
            params.append('use_card_payment', USE_CARD_PAYMENT);
            params.append('api_key', API_KEY);
            params.append('success_url', SUCCESS_URL);
            params.append('fail_url', FAIL_URL);
            params.append('notice_url', NOTICE_URL);

            const postData = params.toString();

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: postData,
                    mode: 'cors',
                    credentials: 'omit'
                });

                const responseText = await response.text();
                handleApiResponse(responseText, response.status);
            } catch (err) {
                // ошибка сети / CORS / таймаут
                let errorDetail = err.message || 'Неизвестная ошибка';
                if (err.name === 'TypeError' && errorDetail.includes('Failed to fetch')) {
                    errorDetail = 'Нет доступа к API (возможно, CORS) или сервер не отвечает.';
                }
                preloaderDiv.innerHTML = `
                    <div class="error-box">
                        ⚠️ Ошибка соединения: ${escapeHtml(errorDetail)}<br>
                        <button class="retry-btn" id="retryErrBtn">Попробовать снова</button>
                    </div>
                `;
                const retryErr = document.getElementById('retryErrBtn');
                if (retryErr) {
                    retryErr.addEventListener('click', () => window.location.reload());
                }
            }
        }

        // минимальная задержка 1.5 секунды (красивый прелоудер)
        // одновременно запускаем запрос, но редирект (или показ ошибки) произойдёт только
        // после того, как отработает и запрос, и пройдёт минимальное время (1500 мс)
        const MIN_PRELOADER_MS = 1500; // 1.5 сек (можно 1200-2000)
        const startTime = Date.now();

        let isRequestFinished = false;
        let isMinTimeElapsed = false;

        function tryRedirectOrComplete() {
            if (isRequestFinished && isMinTimeElapsed) {
                // оба условия выполнены – ожидание прелоудера завершено, ответ уже обработан внутри handleApiResponse
                // handleApiResponse сделает редирект или покажет ошибку. Здесь ничего не делаем, всё уже вызвано.
                // Но повторно вызывать не нужно, так как handleApiResponse уже сработал при завершении fetch.
                return;
            }
        }

        // запускаем запрос
        const fetchPromise = (async () => {
            await sendPaymentRequest(); // внутри вызывает handleApiResponse, который сам делает редирект или меняет DOM
            isRequestFinished = true;
            tryRedirectOrComplete();
        })();

        // таймер на минимальную задержку
        setTimeout(() => {
            isMinTimeElapsed = true;
            tryRedirectOrComplete();
        }, MIN_PRELOADER_MS);

        // Дополнительно: если по какой-то причине ответ придёт мгновенно, но таймер ещё не прошёл,
        // редирект не произойдёт, пока не пройдёт MIN_PRELOADER_MS – это гарантирует показ прелоудера.
        // Однако handleApiResponse вызовет window.location.href сразу, но мы перехватываем это.
        // Чтобы редирект не случился до истечения времени, нужно отложить редирект в handleApiResponse.
        // Переопределим поведение: перехватим момент редиректа и, если минимальное время ещё не вышло, 
        // отложим его с помощью setTimeout, сохраняя красивый прелоудер.
        
        // Патчим: в оригинале handleApiResponse делает прямой редирект. Заменим её на отложенную версию.
        // Сохраним исходную функцию
        const originalHandle = handleApiResponse;
        window.handleApiResponse = function(responseText, status) {
            const elapsed = Date.now() - startTime;
            const remaining = Math.max(0, MIN_PRELOADER_MS - elapsed);
            if (remaining > 0) {
                // задержка до конца минимального времени прелоудера, затем выполняем редирект/ошибку
                setTimeout(() => {
                    originalHandle(responseText, status);
                }, remaining);
            } else {
                originalHandle(responseText, status);
            }
        };
        // заменяем глобальную ссылку
        window.handleApiResponse = window.handleApiResponse;
        // теперь в sendPaymentRequest вызов handleApiResponse пойдёт через отложенную версию
        // нужно переопределить внутри модуля, но handleApiResponse объявлена через const, перезапишем её в области видимости?
        // проще: переопределить функцию через window и в sendPaymentRequest вызывать window.handleApiResponse
        // изменим sendPaymentRequest, чтобы использовала window.handleApiResponse
        // Сделаем это аккуратно, пересобрав функцию
        const originalSend = sendPaymentRequest;
        window.__customHandle = function(text, status) {
            const elapsed = Date.now() - startTime;
            const remaining = Math.max(0, MIN_PRELOADER_MS - elapsed);
            if (remaining > 0) {
                setTimeout(() => { originalHandle(text, status); }, remaining);
            } else {
                originalHandle(text, status);
            }
        };
        
        // Перезапишем sendPaymentRequest с учётом отложенного обработчика
        async function patchedSendPaymentRequest() {
            const merchantOrderId = generateMerchantOrderId();
            const params = new URLSearchParams();
            params.append('amount', AMOUNT);
            params.append('merchant_order_id', merchantOrderId);
            params.append('use_card_payment', USE_CARD_PAYMENT);
            params.append('api_key', API_KEY);
            params.append('success_url', SUCCESS_URL);
            params.append('fail_url', FAIL_URL);
            params.append('notice_url', NOTICE_URL);
            const postData = params.toString();
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: postData,
                    mode: 'cors',
                    credentials: 'omit'
                });
                const responseText = await response.text();
                window.__customHandle(responseText, response.status);
            } catch (err) {
                let errorDetail = err.message || 'Ошибка сети';
                if (err.name === 'TypeError' && errorDetail.includes('Failed to fetch')) {
                    errorDetail = 'CORS или сервер недоступен';
                }
                window.__customHandle(`[ERROR] ${errorDetail}`, 0);
            }
        }
        
        // запускаем отложенный запрос с минимальным временем прелоудера
        const fetchPatched = patchedSendPaymentRequest();
        
        // также следим за таймером минимального отображения (на всякий случай)
        setTimeout(() => {
            // пусто, но гарантируем, что прелоудер покрутится минимум 1.5с
        }, MIN_PRELOADER_MS);
    })();
</script>
</body>
</html>
